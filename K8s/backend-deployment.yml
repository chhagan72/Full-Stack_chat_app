apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: chat-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend-pod
      namespace: chat-apps
      labels: 
        app: backend
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z w 2 mongodb.chat-apps.svc.cluster.local 27017; do echo waiting for mongodb; sleep 2; done;']
      containers:
      - name: chatapp-backend
        image: chhaganp/chatapp-backend:latest
        ports:
        - containerPort: 5001
        env:
        - name: NODE_ENV
          value: production
        - name: MONGODB_URI
          value: "mongodb://mongoadmin:secret@mongodb.chat-apps.svc.cluster.local:27017/dbname?authSource=admin"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: chatapp-secrets
              key: jwt 
        - name: PORT
          value: "5001"